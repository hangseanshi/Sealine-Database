<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Containers with ETA/ATA in Next 7 Days</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1b2a;
    color: #c8d8e8;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }
  .chart-container {
    width: 100%;
    max-width: 900px;
    height: 420px;
    background: #132032;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div class="chart-container">
  <canvas id="chart"></canvas>
</div>
<script>
const cfg = {
  "type": "line",
  "data": {
    "labels": [
      "2026-03-12",
      "2026-03-13",
      "2026-03-14",
      "2026-03-15",
      "2026-03-16",
      "2026-03-17",
      "2026-03-18",
      "2026-03-19"
    ],
    "datasets": [
      {
        "label": "ETA (Estimated)",
        "data": [
          156,
          154,
          176,
          213,
          107,
          171,
          206,
          120
        ],
        "backgroundColor": "#4e9af1aa",
        "borderColor": "#4e9af1",
        "borderWidth": 2,
        "fill": false,
        "tension": 0.3,
        "pointRadius": 4
      },
      {
        "label": "ATA (Actual)",
        "data": [
          39,
          0,
          0,
          0,
          0,
          0,
          0,
          0
        ],
        "backgroundColor": "#f16a4eaa",
        "borderColor": "#f16a4e",
        "borderWidth": 2,
        "fill": false,
        "tension": 0.3,
        "pointRadius": 4
      }
    ]
  },
  "options": {
    "indexAxis": "x",
    "responsive": true,
    "maintainAspectRatio": false,
    "plugins": {
      "legend": {
        "labels": {
          "color": "#c8d8e8"
        }
      },
      "title": {
        "display": true,
        "text": "Containers with ETA/ATA in Next 7 Days",
        "color": "#e0eaf4",
        "font": {
          "size": 16
        }
      }
    },
    "scales": {
      "x": {
        "title": {
          "display": true,
          "text": "Date",
          "color": "#a0b4c8"
        },
        "ticks": {
          "color": "#a0b4c8"
        },
        "grid": {
          "color": "#2a3f55"
        }
      },
      "y": {
        "title": {
          "display": true,
          "text": "Number of Containers",
          "color": "#a0b4c8"
        },
        "ticks": {
          "color": "#a0b4c8"
        },
        "grid": {
          "color": "#2a3f55"
        },
        "beginAtZero": true
      }
    }
  }
};
new Chart(document.getElementById('chart'), cfg);
</script>
</body>
</html>
